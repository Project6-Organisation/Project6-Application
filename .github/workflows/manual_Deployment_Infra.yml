name: Trigger infrastructure deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy
      environment:
        description: "Environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read

jobs:
  call-Deployment-Infra:
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_03_Deployment_Infra.yml@main
    with:
      action: ${{ github.event.inputs.action }}
      environment: ${{ github.event.inputs.environment }}
    secrets: inherit