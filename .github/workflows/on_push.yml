name: Integration Workflow

on:
  push:
    branches:
      - "**"
    
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
 
jobs:
  Generic-pipeline-main:
    # Triggered on :
    # - on push to all branchs
    # - on pull request (create) to develop or main branch
    # - on merge to develop or main branch (the event is push)
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_01_Integration.yml@main
    secrets: inherit

  Artefact:
    # Triggered on :
    # - on merge to develop or main branch (the event is push)
    needs:
      - Generic-pipeline-main
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_01_Integration.yml@main
    secrets: inherit