name: Integration Workflow

on:
  push:
    branches:
      - "**"
  
  pull_request:
    branches:
      - "main"

  # pull_request:
  #   branches:
  #     - develop
  #     - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  Generic-pipeline-main:
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_01_Integration.yml@main
    secrets: inherit

  Release-and-build-images:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs:
      - Generic-pipeline-main
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_02_Release_And_Docker.yml@main
    secrets: inherit