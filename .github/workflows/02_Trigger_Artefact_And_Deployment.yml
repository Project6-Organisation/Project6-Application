name: Artefact and Deployment Workflow

# Triggered on :
# - on merge to develop or main branch (the event is push)

on:
  push:
    branches:
      - develop
      - main
    
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
 
jobs:  
  Artefact:
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_02_Artefact.yml@main
    secrets: inherit

  Continuous-Deployment:
    needs: Artefact
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_04_Deployment_Appli.yml@main
    with:
      environment: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
      image_tag: ${{ needs.Artefact.outputs.image_tag }}
    secrets: inherit