name: Trigger application rollback

on:
  workflow_dispatch:
    inputs:      
      environment:
        description: "Environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

      revision:
        description: "Helm revision to rollback to"
        required: true
        default: "1"

permissions:
  contents: read
  packages: read

jobs:
  Trigger-Rollback:
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_06_Rollback.yml@main
    with:
      environment: ${{ github.event.inputs.environment }}
      revision: ${{ github.event.inputs.revision }}
    secrets: inherit