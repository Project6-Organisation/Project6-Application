name: Continuous Integration

# Triggered on :
# - on push to all feature branchs (main are exluded)
# - on pull request (create) to develop or main branch

on:
  push:    
    branches-ignore:
      - main
    
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
 
jobs:

  Continuous-Integration:
    uses: Project6-Organisation/Project6-Integration/.github/workflows/_01_Integration.yml@main
    secrets: inherit